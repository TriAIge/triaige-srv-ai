version: "3.9"

services:

  # ── Serviço de IA ─────────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: triaige-srv-ai
    restart: unless-stopped
    profiles:
      - app   # executar com: docker compose --profile app up
    environment:
      SPRING_PROFILES_ACTIVE: ho
      SERVER_PORT: 8082
      AWS_REGION: us-east-1
      S3_ENDPOINT: http://host.docker.internal:4566
      S3_FORCE_PATH_STYLE: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your-gemini-api-key-here}
      GEMINI_MODEL: gemini-2.5-flash
      LOG_LEVEL: DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 8
